apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: db-secret
  namespace: student-api

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: db-secret
    creationPolicy: Owner

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: student-api
        property: DATABASE_URL

    - secretKey: DB_USER
      remoteRef:
        key: student-api
        property: DB_USER

    - secretKey: DB_PASSWORD
      remoteRef:
        key: student-api
        property: DB_PASSWORD